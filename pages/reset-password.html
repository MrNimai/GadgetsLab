<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - GadgetLab</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <header>
    <div class="header__actions">
          
       <a href="cart.html" class="header__cart-btn" aria-label="Shopping cart">
         🛒
       </a>
     </div>
  </header>
  <main id="main-content">
    <div class="auth-container">
      <h1 class="auth-title">Reset Your Password</h1>
      <form class="auth-form" id="reset-password-form">
        <label class="auth-label">New Password
          <input class="auth-input" type="password" id="password" name="password" minlength="6" required>
        </label>
        <label class="auth-label">Confirm New Password
          <input class="auth-input" type="password" id="password-confirm" name="password-confirm" minlength="6" required>
        </label>
        <button class="auth-submit" type="submit">Reset Password</button>
        <div id="message" aria-live="polite" style="margin-top: 1rem; text-align: center;"></div>
      </form>
    </div>
  </main>

  <script>
    const resetPasswordForm = document.getElementById('reset-password-form');
    const messageDiv = document.getElementById('message');
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
        messageDiv.textContent = 'Invalid or missing reset token.';
        messageDiv.style.color = 'red';
        resetPasswordForm.querySelector('button').disabled = true;
    }

    resetPasswordForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        messageDiv.className = '';

        const password = document.getElementById('password').value;
        const passwordConfirm = document.getElementById('password-confirm').value;

        if (password !== passwordConfirm) {
            messageDiv.textContent = 'Passwords do not match.';
            messageDiv.style.color = 'red';
            return;
        }

        messageDiv.textContent = 'Resetting...';

        try {
            const res = await fetch(`/api/reset-password/${token}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ password })
            });

            const data = await res.json();

            if (res.ok) {
                messageDiv.textContent = 'Password has been reset successfully! Redirecting to login...';
                messageDiv.style.color = 'green';
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
            } else {
                messageDiv.textContent = data.message || 'An error occurred.';
                messageDiv.style.color = 'red';
            }
        } catch (err) {
            console.error('Reset Password fetch error:', err);
            messageDiv.textContent = 'Could not connect to the server. Please try again later.';
            messageDiv.style.color = 'red';
        }
    });
  </script>
</body>
</html>
