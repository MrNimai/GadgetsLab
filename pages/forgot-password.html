<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - GadgetLab</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <header>
    <div class="container header__container">
      <a href="/" class="header__logo-link" aria-label="GadgetLab home">
        <img src="../images/logo.svg" alt="GadgetLab" class="header__logo">
      </a>
      <div class="header__actions">
         <div class="header__auth" data-auth-area></div>
         <a href="cart.html" class="header__cart-btn" aria-label="Shopping cart">
           🛒
         </a>
       </div>
    </div>
  </header>
  <main id="main-content">
    <div class="auth-container">
      <h1 class="auth-title">Forgot Your Password?</h1>
      <p class="auth-subtext">Enter your email address and we'll send you a link to reset your password.</p>
      <form class="auth-form" id="forgot-password-form">
        <label class="auth-label">Email
          <input class="auth-input" type="email" id="email" name="email" autocomplete="email" required>
        </label>
        <button class="auth-submit" type="submit">Send Reset Link</button>
        <div id="message" aria-live="polite" style="margin-top: 1rem; text-align: center;"></div>
      </form>
    </div>
  </main>

  <script>
    const forgotPasswordForm = document.getElementById('forgot-password-form');
    const messageDiv = document.getElementById('message');

    forgotPasswordForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        messageDiv.className = '';
        messageDiv.textContent = 'Sending...';

        const email = document.getElementById('email').value;

        try {
            const res = await fetch('http://localhost:3001/api/forgot-password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email })
            });

            const data = await res.json();

            if (res.ok) {
                messageDiv.textContent = 'If an account with that email exists, a reset link has been generated in the server console.';
                messageDiv.style.color = 'green';
            } else {
                messageDiv.textContent = data.message || 'An error occurred.';
                messageDiv.style.color = 'red';
            }
        } catch (err) {
            console.error('Forgot Password fetch error:', err);
            messageDiv.textContent = 'Could not connect to the server. Please try again later.';
            messageDiv.style.color = 'red';
        }
    });
  </script>
</body>
</html>
